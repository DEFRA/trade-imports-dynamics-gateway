management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  metrics:
    enabled: false

cdp:
  service-version: 0.0.0-test

logging:
  level:
    root: INFO
    uk.gov.defra.cdp.dynamicsgateway: INFO
    org.springframework: INFO

info:
  app:
    name: ${spring.application.name}
    version: ${cdp.service-version}
    environment: local

# Placeholder values so @NotBlank validation passes on context load in ApplicationTest,
# which does not extend IntegrationBase. Integration tests that extend IntegrationBase
# override these at runtime via @DynamicPropertySource from ServiceBusEmulatorContainer.
azure:
  servicebus:
    connection-string: Endpoint=sb://placeholder.servicebus.windows.net/;SharedAccessKeyName=placeholder;SharedAccessKey=cGxhY2Vob2xkZXI=
    queue: test-queue
