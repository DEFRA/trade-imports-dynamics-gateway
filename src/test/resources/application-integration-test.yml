management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  metrics:
    enabled: false

aws:
  sqs:
    notification:
      # Placeholder so @NotBlank validation passes for ITs that don't use the SQS listener.
      # NotificationSqsListenerIT overrides this via @DynamicPropertySource with the real LocalStack URL.
      queue-url: http://localhost:4566/000000000000/trade_imports_animals_eu_notifications_gateway.fifo

azure:
  servicebus:
    transport-type: amqp

cdp:
  service-version: 0.0.0-test

logging:
  level:
    root: INFO
    uk.gov.defra.cdp.dynamicsgateway: INFO
    org.springframework: INFO

info:
  app:
    name: ${spring.application.name}
    version: ${cdp.service-version}
    environment: local
