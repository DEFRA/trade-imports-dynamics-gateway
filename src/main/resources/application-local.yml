# Development profile - exposes additional actuator endpoints for debugging

logging:
  level:
    root: INFO
    uk.gov.defra.cdp.dynamicsgateway: DEBUG
    org.springframework: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:INFO}
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
    software.amazon.cloudwatchlogs.emf: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: when-authorized

# SpringDoc — enable Swagger UI locally
springdoc:
  swagger-ui:
    enabled: true

# App-level overrides for local development
# AWS credentials are dummy values accepted by LocalStack — never use real keys here
app:
  aws:
    endpoint-override: ${APP_AWS_ENDPOINT_OVERRIDE:http://localhost:4566}
    access-key-id: test
    secret-access-key: test

aws:
  sqs:
    notification:
      queue-url: ${NOTIFICATION_SQS_QUEUE_URL:http://localhost:4566/000000000000/trade_imports_animals_eu_notifications_gateway.fifo}
      dlq-url: ${NOTIFICATION_SQS_DLQ_URL:http://localhost:4566/000000000000/trade_imports_animals_eu_notifications_gateway-deadletter.fifo}
      dlq-arn: ${NOTIFICATION_SQS_DLQ_ARN:arn:aws:sqs:eu-west-2:000000000000:trade_imports_animals_eu_notifications_gateway-deadletter.fifo}

# Local default so the DLQ replay/delete endpoints are exercisable without extra env setup.
admin:
  # Local default must match the admin + backend default (local-trade-imports-animals-admin-secret)
  # so the admin app's replay/delete calls authenticate against this gateway without extra env setup.
  secret: ${TRADE_IMPORTS_ANIMALS_ADMIN_SECRET:local-trade-imports-animals-admin-secret}

azure:
  servicebus:
    # Plain AMQP — the local emulator (v1.1.2) does not support AMQP_WEB_SOCKETS.
    transport-type: amqp
    connection-string: ${AZURE_SERVICE_BUS_CONNECTION_STRING:Endpoint=sb://localhost;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;EntityPath=local-queue}
