server:
  port: ${PORT:8088}
  shutdown: graceful

spring:
  application:
    name: trade-imports-dynamics-gateway
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    aws:
      region:
        static: ${aws.region}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true
  metrics:
    enabled: ${METRICS_ENABLED:true}
    enable:
      all: false
      controller: true
      jvm:
        memory:
          committed: true
          used: true
          max: true
        threads:
          live: true
          peak: true
      http:
        server:
          requests:
            active: true

# CDP platform configuration
cdp:
  certificate: ${TRUSTSTORE_CDP_ROOT_CA:}
  metrics:
    enabled: true
  service-version: ${SERVICE_VERSION:0.0.0-local}
  tracing:
    header-name: ${TRACING_HEADER:x-cdp-request-id}
  proxyUrl: ${HTTP_PROXY:}

# Application-level AWS overrides
app:
  aws:
    endpoint-override: ${APP_AWS_ENDPOINT_OVERRIDE:}
    # Local development only — set via environment variables or application-local.yml.
    # Do NOT set real credentials here; these keys are ignored in deployed environments.
    # access-key-id: ${APP_AWS_ACCESS_KEY_ID:}
    # secret-access-key: ${APP_AWS_SECRET_ACCESS_KEY:}

# AWS configuration
aws:
  region: ${AWS_REGION:eu-west-2}
  emf:
    enabled: ${AWS_EMF_ENABLED:true}
    environment: ${AWS_EMF_ENVIRONMENT:Local}
    namespace: ${AWS_EMF_NAMESPACE:trade-imports-dynamics-gateway}
    service:
      name: ${AWS_EMF_SERVICE_NAME:trade-imports-dynamics-gateway}
      type: ${AWS_EMF_SERVICE_TYPE:SpringBootApp}
  sqs:
    notification:
      queue-url: ${NOTIFICATION_SQS_QUEUE_URL:}
      visibility-timeout-seconds: ${SQS_VISIBILITY_TIMEOUT_SECONDS:30}
      wait-time-seconds: ${SQS_WAIT_TIME_SECONDS:20}
      max-messages: ${SQS_MAX_MESSAGES:10}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    uk.gov.defra.cdp.dynamicsgateway: ${LOG_LEVEL:DEBUG}
    org.springframework: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:INFO}
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}

info:
  app:
    name: ${spring.application.name}
    version: ${cdp.service-version}
    environment: ${ENVIRONMENT:local}

azure:
  servicebus:
    connection-string: ${AZURE_SERVICE_BUS_CONNECTION_STRING:}
    # AMQP_WEB_SOCKETS required in CDP so egress traffic goes via the platform proxy (port 443).
    # Override to AMQP in local/integration-test profiles where no proxy is involved.
    transport-type: amqp_web_sockets
