server:
  port: ${PORT:8088}
  shutdown: graceful

# AWS configuration — defined before spring.cloud.aws references ${aws.region}
aws:
  region: ${AWS_REGION:eu-west-2}
  emf:
    enabled: ${AWS_EMF_ENABLED:true}
    environment: ${AWS_EMF_ENVIRONMENT:Local}
    namespace: ${AWS_EMF_NAMESPACE:trade-imports-dynamics-gateway}
    service:
      name: ${AWS_EMF_SERVICE_NAME:trade-imports-dynamics-gateway}
      type: ${AWS_EMF_SERVICE_TYPE:SpringBootApp}
  sqs:
    notification:
      # Required in non-local environments — @NotBlank on NotificationSqsConfig.queueUrl
      queue-url: ${NOTIFICATION_SQS_QUEUE_URL:}
      # DLQ for the list/replay/delete API — CDP provisions it with a -deadletter suffix.
      dlq-url: ${NOTIFICATION_SQS_DLQ_URL:}
      visibility-timeout-seconds: ${SQS_VISIBILITY_TIMEOUT_SECONDS:30}
      wait-time-seconds: ${SQS_WAIT_TIME_SECONDS:20}
      # Max messages processed concurrently by the listener (also the receive-poll batch size). Across
      # distinct FIFO message groups only; within a group SQS still delivers one at a time. Max 10 (SQS
      # ReceiveMessage limit / awspring maxMessagesPerPoll).
      max-messages: ${SQS_MAX_MESSAGES:3}
      # In-process exponential backoff for a transient ASB publish failure (Spring RetryTemplate +
      # ExponentialBackOffPolicy, retrying only SqsRetryableException). The total retry window must
      # stay below visibility-timeout-seconds; defaults give 1s + 2s + 4s = 7s across 4 attempts.
      retry:
        max-attempts: ${SQS_RETRY_MAX_ATTEMPTS:4}
        initial-interval: ${SQS_RETRY_INITIAL_INTERVAL_MS:1000}
        multiplier: ${SQS_RETRY_MULTIPLIER:2.0}
        max-interval: ${SQS_RETRY_MAX_INTERVAL_MS:10000}

# Shared secret guarding the DLQ replay/delete endpoints. Same value the admin app already holds
# and sends to the backend — both services must be configured with the same value per environment.
admin:
  secret: ${TRADE_IMPORTS_ANIMALS_ADMIN_SECRET:}

# SpringDoc / Swagger UI — disabled in deployed environments (enabled in application-local.yml)
springdoc:
  swagger-ui:
    enabled: false

spring:
  application:
    name: trade-imports-dynamics-gateway
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    aws:
      region:
        static: ${aws.region}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true
  metrics:
    enabled: ${METRICS_ENABLED:true}
    enable:
      all: false
      controller: true
      jvm:
        memory:
          committed: true
          used: true
          max: true
        threads:
          live: true
          peak: true
      http:
        server:
          requests:
            active: true

# CDP platform configuration
cdp:
  certificate: ${TRUSTSTORE_CDP_ROOT_CA:}
  metrics:
    enabled: true
  service-version: ${SERVICE_VERSION:0.0.0-local}
  tracing:
    header-name: ${TRACING_HEADER:x-cdp-request-id}
  proxyUrl: ${HTTP_PROXY:}

# Application-level AWS overrides
app:
  aws:
    endpoint-override: ${APP_AWS_ENDPOINT_OVERRIDE:}
    # Local development only — set via environment variables or application-local.yml.
    # Do NOT set real credentials here; these keys are ignored in deployed environments.
    # access-key-id: ${APP_AWS_ACCESS_KEY_ID:}
    # secret-access-key: ${APP_AWS_SECRET_ACCESS_KEY:}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    uk.gov.defra.cdp.dynamicsgateway: ${LOG_LEVEL:DEBUG}
    org.springframework: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:INFO}
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
    # Azure Service Bus SDK logs AMQP link/session lifecycle ("az.sdk.message") at INFO, which floods
    # the logs (especially against the local ASB emulator's reconnect churn). WARN keeps real problems.
    com.azure: ${LOGGING_LEVEL_COM_AZURE:WARN}

info:
  app:
    name: ${spring.application.name}
    version: ${cdp.service-version}
    environment: ${ENVIRONMENT:local}

azure:
  servicebus:
    connection-string: ${AZURE_SERVICE_BUS_CONNECTION_STRING:}
    # AMQP_WEB_SOCKETS required in CDP so egress traffic goes via the platform proxy (port 443).
    # Override to AMQP in local/integration-test profiles where no proxy is involved.
    transport-type: amqp_web_sockets
