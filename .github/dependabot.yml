version: 2

updates:
  - package-ecosystem: maven
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'
    versioning-strategy: increase
    allow:
      - dependency-type: direct

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'
