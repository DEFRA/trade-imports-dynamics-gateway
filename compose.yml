services:

  localstack:
    image: localstack/localstack:3.0.2
    container_name: localstack
    profiles: ['infra', 'services']
    ports:
      - '4566:4566'
    env_file:
      - './compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN
      SERVICES: s3,sts,cloudwatch
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - trade-imports-tenant

  trade-imports-dynamics-gateway:
    container_name: trade-imports-dynamics-gateway
    profiles: ['services']
    build:
      context: .
      target: development
    depends_on:
      localstack:
        condition: service_healthy
    env_file:
      - './compose/aws.env'
    ports:
      - '8088:8088'
      - '5008:5005'
    environment:
      # Server
      PORT: 8088

      # Service identity
      SERVICE_VERSION: 0.0.0-local
      ENVIRONMENT: local

      # AWS (via LocalStack)
      APP_AWS_ENDPOINT_OVERRIDE: http://localstack:4566
      AWS_REGION: eu-west-2

      # Logging
      LOG_LEVEL: DEBUG

      # Metrics
      METRICS_ENABLED: true

      # Spring profile (local = exposes debugging actuator endpoints)
      SPRING_PROFILES_ACTIVE: local

      # Java remote debug (uncomment to enable)
      # JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    networks:
      - trade-imports-tenant

volumes:
  localstack-data:

networks:
  trade-imports-tenant:
    name: trade-imports-tenant
