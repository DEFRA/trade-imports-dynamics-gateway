services:

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    profiles: ['infra', 'services']
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'YourStrong@Passw0rd'
    networks:
      trade-imports-tenant:
        aliases:
          - sqledge
    healthcheck:
      test: ['CMD-SHELL', '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" -b -No']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:1.1.2
    container_name: servicebus-emulator
    profiles: ['infra', 'services']
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ACCEPT_EULA: 'Y'
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: 'YourStrong@Passw0rd'
    volumes:
      - './compose/servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json'
    ports:
      - '5672:5672'
    networks:
      - trade-imports-tenant

  localstack:
    image: localstack/localstack:3.0.2
    container_name: localstack
    profiles: ['infra', 'services']
    ports:
      - '4566:4566'
    env_file:
      - './compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN
      SERVICES: s3,sts,cloudwatch
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - trade-imports-tenant

  trade-imports-dynamics-gateway:
    container_name: trade-imports-dynamics-gateway
    profiles: ['services']
    build:
      context: .
      target: development
    depends_on:
      localstack:
        condition: service_healthy
      servicebus-emulator:
        condition: service_started
    env_file:
      - './compose/aws.env'
    ports:
      - '8088:8088'
      - '5008:5005'
    environment:
      # Server
      PORT: 8088

      # Service identity
      SERVICE_VERSION: 0.0.0-local
      ENVIRONMENT: local

      # AWS (via LocalStack)
      APP_AWS_ENDPOINT_OVERRIDE: http://localstack:4566
      AWS_REGION: eu-west-2

      # Logging
      LOG_LEVEL: DEBUG

      # Metrics
      METRICS_ENABLED: true

      # Spring profile (local = exposes debugging actuator endpoints)
      SPRING_PROFILES_ACTIVE: local

      # Azure Service Bus — uses the local emulator by default.
      # Override with a real SAS connection string (including EntityPath) to target TST.
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:-Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;EntityPath=local-queue}

      # Java remote debug (uncomment to enable)
      # JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    networks:
      - trade-imports-tenant

volumes:
  localstack-data:

networks:
  trade-imports-tenant:
    name: trade-imports-tenant
